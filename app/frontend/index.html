<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealLens AI - Native Audio Shopping Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .mic-button:hover {
            transform: scale(1.05);
        }

        .mic-button.recording {
            background: linear-gradient(45deg, #ff4757, #ff3838);
            animation: pulse 1.5s infinite;
        }

        .mic-button.processing {
            background: linear-gradient(45deg, #ffa502, #ff6348);
            animation: spin 2s linear infinite;
        }

        .mic-icon {
            width: 40px;
            height: 40px;
            fill: white;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .status {
            font-size: 1.1rem;
            margin-bottom: 20px;
            min-height: 30px;
            font-weight: 500;
        }

        .deals-container {
            margin-top: 30px;
            text-align: left;
        }

        .deal-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            backdrop-filter: blur(5px);
        }

        .deal-store {
            font-weight: bold;
            color: #4ecdc4;
        }

        .deal-price {
            font-size: 1.2rem;
            color: #ff6b6b;
            font-weight: bold;
        }

        .deal-savings {
            color: #2ed573;
            font-weight: bold;
        }

        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .error {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .audio-visualizer {
            height: 60px;
            margin: 20px 0;
            display: flex;
            align-items: end;
            justify-content: center;
            gap: 2px;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, #4ecdc4, #ff6b6b);
            border-radius: 2px;
            transition: height 0.1s ease;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎯 DealLens AI</h1>
        <p class="subtitle">Your Native Audio Shopping Assistant</p>

        <button id="micButton" class="mic-button">
            <svg class="mic-icon" viewBox="0 0 24 24">
                <path
                    d="M12 2c1.1 0 2 .9 2 2v6c0 1.1-.9 2-2 2s-2-.9-2-2V4c0-1.1.9-2 2-2zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H6c0 3.53 2.61 6.43 6 6.93V21h2v-3.07c3.39-.5 6-3.4 6-6.93h-2z" />
            </svg>
        </button>

        <div id="status" class="status">Click the microphone to start talking</div>

        <div id="audioVisualizer" class="audio-visualizer" style="display: none;">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div id="dealsContainer" class="deals-container"></div>

        <div id="errorContainer"></div>

        <div class="instructions">
            <h3>💬 Try saying:</h3>
            <p>• "I found AirPods Pro for £249 at Apple Store, can you find them cheaper?"</p>
            <p>• "What's the best deal on PlayStation 5 right now?"</p>
            <p>• "I'm looking for a MacBook Air under £1200"</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
